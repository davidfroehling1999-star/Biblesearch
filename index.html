<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Marginalia — Sermon Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Inter+Tight:wght@400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="bible-data.jsx"></script>
<script type="text/babel" src="sermon-data.jsx"></script>
<script type="text/babel" src="ui-primitives.jsx"></script>
<script type="text/babel" src="panels.jsx"></script>
<script type="text/babel" src="sermon-view.jsx"></script>
<script type="text/babel" src="library-view.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "warm"
}/*EDITMODE-END*/;

function App() {
  const [view, setView] = React.useState(() => {
    const stored = localStorage.getItem("marginalia_view");
    return stored ? JSON.parse(stored) : { screen: "library", sermonId: null };
  });
  const [sermons, setSermons] = React.useState(() => {
    const stored = localStorage.getItem("marginalia_sermons");
    return stored ? JSON.parse(stored) : window.SERMONS;
  });
  const [theme, setTheme] = React.useState(() => {
    return localStorage.getItem("marginalia_theme") || TWEAK_DEFAULTS.theme;
  });
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => { localStorage.setItem("marginalia_view", JSON.stringify(view)); }, [view]);
  React.useEffect(() => { localStorage.setItem("marginalia_sermons", JSON.stringify(sermons)); }, [sermons]);
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("marginalia_theme", theme);
  }, [theme]);

  // Tweaks integration with host toolbar
  React.useEffect(() => {
    function onMsg(e) {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    }
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  function setThemePersisted(t) {
    setTheme(t);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { theme: t } }, "*");
  }

  function openSermon(s) { setView({ screen: "sermon", sermonId: s.id }); }
  function goLibrary() { setView({ screen: "library", sermonId: null }); }
  function updateSermon(updated) {
    setSermons(prev => prev.map(s => s.id === updated.id ? updated : s));
  }
  function importSermon(data) {
    setSermons(prev => [data, ...prev]);
    setView({ screen: "sermon", sermonId: data.id });
  }
  function deleteSermon(id) {
    setSermons(prev => prev.filter(s => s.id !== id));
  }
  function importLibrary(incoming) {
    setSermons(prev => {
      const existingIds = new Set(prev.map(s => s.id));
      const fresh = incoming.filter(s => !existingIds.has(s.id));
      return [...fresh, ...prev];
    });
  }

  const currentSermon = sermons.find(s => s.id === view.sermonId);

  return (
    <>
      {view.screen === "library" || !currentSermon ? (
        <LibraryView
          sermons={sermons}
          onOpen={openSermon}
          onImport={importSermon}
          onEdit={updateSermon}
          onDelete={deleteSermon}
          onImportLibrary={importLibrary}
          theme={theme}
          setTheme={setThemePersisted}
        />
      ) : (
        <SermonView
          sermon={currentSermon}
          onBack={goLibrary}
          onUpdateSermon={updateSermon}
        />
      )}
      {tweaksOpen && <TweaksPanel theme={theme} setTheme={setThemePersisted} />}
    </>
  );
}

function TweaksPanel({ theme, setTheme }) {
  const themes = [
    { id: "warm", label: "Warm", swatch: "#d9b478" },
    { id: "cool", label: "Cool", swatch: "#a7c2a0" },
    { id: "dark", label: "Dark", swatch: "#2a251d" }
  ];
  return (
    <div className="tweaks">
      <div className="tweaks-head">
        Tweaks
        <span className="tweaks-head-sub">Live</span>
      </div>
      <div className="tweaks-row">
        <div className="tweaks-label">Color theme</div>
        <div className="tweaks-theme-row">
          {themes.map(t => (
            <button
              key={t.id}
              className={"tweaks-theme-btn" + (theme === t.id ? " active" : "")}
              onClick={() => setTheme(t.id)}
            >
              <div className="tweaks-theme-swatch" style={{ background: t.swatch }}/>
              {t.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
